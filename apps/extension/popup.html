<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>VidForge AI Extension</title>
  <style>
    body {
      width: 350px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #1a1a1a;
      color: #fff;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(to right, #7f1d1d, #9a3412);
    }
    .header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }
    .container {
      padding: 16px;
    }
    .btn {
      width: 100%;
      padding: 10px;
      background-color: #ef4444;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-bottom: 12px;
    }
    .btn:hover {
      background-color: #dc2626;
    }
    .btn-outline {
      background-color: transparent;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .btn-outline:hover {
      background-color: rgba(255, 255, 255, 0.05);
    }
    .info-box {
      margin-top: 16px;
      padding: 12px;
      background-color: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #4ade80;
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon.jpg" alt="VidForge AI Logo" width="24" height="24" style="border-radius: 4px; object-fit: cover;" />
    <h1>VidForge AI</h1>
  </div>
  
  <div class="container">
    <button id="openAppBtn" class="btn">Mở VidForge AI</button>
    <button id="extractBtn" class="btn btn-outline">Lấy nội dung trang hiện tại</button>
    
    <div id="status">Đã lấy nội dung thành công!</div>
    
    <div class="info-box">
      VidForge AI - Lấy nội dung tạo kịch bản
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
