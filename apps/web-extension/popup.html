<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>VidForge AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      width: 400px;
      min-height: 500px;
      margin: 0;
      padding: 0;
      background-color: #121212;
      color: #fff;
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body class="overflow-hidden flex flex-col h-full font-sans">
  
  <!-- Header -->
  <header class="flex items-center justify-between p-4 border-b border-white/10 bg-black/60 backdrop-blur-md sticky top-0 z-10 shrink-0">
    <div class="flex items-center gap-3">
      <img src="icon48.png" alt="Logo" class="w-8 h-8 rounded-lg shadow-[0_0_15px_rgba(168,85,247,0.5)]" />
      <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-500 tracking-tight">
        VidForge.AI
      </h1>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-col p-4 overflow-y-auto relative" id="app-content">
    
    <!-- Background Effects -->
    <div class="fixed top-20 right-0 w-32 h-32 bg-purple-500/10 blur-[40px] rounded-full pointer-events-none z-0"></div>
    <div class="fixed bottom-0 left-0 w-40 h-40 bg-pink-500/10 blur-[50px] rounded-full pointer-events-none z-0"></div>

    <!-- 1. Loading State -->
    <div id="loading-state" class="flex flex-col items-center justify-center flex-1 py-12 z-10">
      <div class="animate-spin w-10 h-10 border-4 border-purple-500 border-t-transparent rounded-full mb-4 shadow-[0_0_15px_rgba(168,85,247,0.5)]"></div>
      <p class="text-gray-400 font-medium">Đang kết nối...</p>
    </div>

    <!-- 2. Unauthenticated State -->
    <div id="unauth-state" class="hidden flex-col items-center justify-center flex-1 py-8 text-center z-10">
      <div class="w-20 h-20 bg-gradient-to-br from-purple-500/20 to-pink-500/20 rounded-full flex items-center justify-center mb-6 shadow-inner border border-white/5">
        <svg class="w-10 h-10 text-purple-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
      </div>
      <h2 class="text-2xl font-bold mb-3">Chào mừng bạn!</h2>
      <p class="text-gray-400 mb-8 text-sm px-4 leading-relaxed">Đăng nhập vào VidForge AI để bắt đầu chuyển đổi nội dung trang web thành video tự động.</p>
      
      <button id="btn-login" class="w-full max-w-[250px] py-3.5 bg-white text-black text-sm font-bold rounded-xl hover:scale-105 hover:shadow-[0_10px_25px_rgba(255,255,255,0.2)] transition-all duration-300">
        Đăng Nhập Ngay
      </button>
    </div>

    <!-- 3. Authenticated State -->
    <div id="auth-state" class="hidden flex-col flex-1 z-10">
      
      <!-- User Profile Card -->
      <div class="flex items-center gap-3 mb-6 p-4 bg-white/5 rounded-2xl border border-white/10 backdrop-blur-sm shadow-xl">
        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center text-xl font-bold text-white shadow-lg shrink-0" id="user-avatar-placeholder">
          U
        </div>
        <div class="flex-1 overflow-hidden">
          <p class="font-bold text-base truncate text-white" id="user-name">User Name</p>
          <p class="text-xs text-gray-400 truncate mt-0.5" id="user-email">user@email.com</p>
        </div>
        <button id="btn-logout" class="shrink-0 p-2 text-gray-400 hover:text-red-400 hover:bg-red-500/10 rounded-lg transition-colors" title="Đăng xuất">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
        </button>
      </div>

      <!-- Action Buttons -->
      <div class="space-y-4">
        
        <div class="bg-gradient-to-br from-purple-500/10 to-pink-500/10 p-1 rounded-2xl">
          <button id="btn-extract" class="w-full py-5 px-4 bg-gradient-to-r from-purple-600 to-pink-600 rounded-xl font-bold hover:shadow-[0_0_25px_rgba(168,85,247,0.5)] transition-all flex flex-col items-center gap-3 group relative overflow-hidden">
            <div class="absolute inset-0 bg-white/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
            <svg class="w-8 h-8 group-hover:scale-110 transition-transform relative z-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
            </svg>
            <div class="relative z-10 text-center">
              <span class="block text-lg">Phân Tích Trang Này</span>
              <span class="block text-xs font-normal text-white/70 mt-1">Lấy nội dung để tạo Video Script</span>
            </div>
          </button>
        </div>

        <button id="btn-dashboard" class="w-full py-4 px-4 bg-white/5 border border-white/10 rounded-2xl font-medium hover:bg-white/10 transition-all flex items-center justify-center gap-2 group">
          <svg class="w-5 h-5 text-gray-400 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
          </svg>
          Mở Dashboard
        </button>

      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="p-3 text-center text-[10px] text-gray-500 border-t border-white/10 bg-black/40 shrink-0 uppercase tracking-widest">
    VidForge AI &copy; 2026
  </footer>
  
  <script src="popup.js"></script>
</body>
</html>
