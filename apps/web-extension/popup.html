<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>VidForge AI Web App</title>
  <style>
    body {
      width: 500px;
      height: 600px;
      margin: 0;
      padding: 0;
      background-color: #1a1a1a;
      display: flex;
      flex-direction: column;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      flex-grow: 1;
    }
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-family: sans-serif;
      z-index: -1;
    }
  </style>
</head>
<body>
  <div class="loading">Đang tải VidForge AI...</div>
  <iframe src="https://vidforge-ai.duckdns.org/"></iframe>
</body>
</html>
