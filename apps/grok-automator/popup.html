<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; width: 320px; padding: 15px; margin: 0; background-color: #f9f9f9; }
    h3 { margin-top: 0; color: #333; }
    textarea { width: 100%; height: 80px; margin-bottom: 10px; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; resize: none;}
    button { width: 100%; padding: 10px; background-color: #000; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; transition: background 0.2s;}
    button:hover { background-color: #333; }
    #status { margin-top: 15px; font-size: 0.9em; color: #555; padding: 10px; background: #eee; border-radius: 4px; display: none; }
  </style>
</head>
<body>
  <h3>VidForge AI</h3>
  <textarea id="prompt" placeholder="Nhập chủ đề video (vd: Sự trỗi dậy của AI)..."></textarea>
  <button id="start-btn">Tạo Kịch Bản trên Grok</button>
  <div id="status">Sẵn sàng...</div>
  
  <script src="popup.js"></script>
</body>
</html>
