<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: 'Segoe UI', sans-serif; width: 300px; padding: 15px; margin: 0; background: #f9f9f9; text-align: center; }
    h3 { margin-top: 0; color: #333; }
    p { font-size: 13px; color: #666; text-align: left; }
    button { width: 100%; padding: 12px; background-color: #000; color: white; border: none; cursor: pointer; border-radius: 6px; font-weight: bold; transition: background 0.2s;}
    button:hover { background-color: #333; }
    #status { margin-top: 15px; font-size: 0.9em; color: #555; padding: 10px; background: #eee; border-radius: 4px; display: none; }
    .result-container {
      margin-top: 15px;
      display: none;
    }
    textarea {
      width: 100%;
      height: 100px;
      margin-bottom: 10px;
      padding: 5px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 12px;
      resize: vertical;
    }
    .action-btn {
      background-color: #000;
      color: #fff;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h3>VidForge AI</h3>
    <button id="start-btn">Lấy Kịch Bản (Tạo video)</button>
    <p id="status" style="display: none;"></p>
    
    <div id="result-container" class="result-container">
      <p style="font-size: 12px; margin-bottom: 5px; font-weight: bold; color: #333;">Kịch bản / Prompt mới nhất thu được:</p>
      <textarea id="script-preview" readonly></textarea>
      <button id="grok-btn" class="action-btn">Tiếp tục: Mở Google Gemini & Tạo Video</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
